exec-once = swww-daemon &
exec-once = swww img /home/kareedesuka/Pictures/wallpaper.jpg
exec-once = gammastep
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1


exec-once = sleep 1 && waybar
exec-once = nm-applet
exec-once = blueman-applet
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1


# Variables
$mod = SUPER

$terminal = kitty
$browser = zen-browser
$filemanager = thunar
$launcher = wofi --show drun

# Monitor
monitor = ,preferred,auto,1

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }
}

# General
general {
    gaps_in = 6
    gaps_out = 10
    border_size = 0
}

cursor {
    no_hardware_cursors = false
}


decoration {
    rounding = 0
    
    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}



# Keybinds
bind = $mod, Q, exec, $terminal
bind = $mod, C, killactive
bind = $mod, M, exit
bind = $mod, F, fullscreen, 1

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, V, exec, pavucontrol           #sound
bind = $mod, W, exec, nm-connection-editor  #wifi
bind = $mod, B, exec, blueman-manager       #bluetooth

# ===== Swap windows =====
bind = $mod SHIFT, left, swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up, swapwindow, u
bind = $mod SHIFT, down, swapwindow, d

bind = $mod, k, exec, sudo nvidia-smi -pm 1 && sudo nvidia-smi -lgc 210,420 && pkill -RTMIN+8 waybar && notify-send "GPU Locked: Power Save"

bind = $mod SHIFT, k, exec, sudo nvidia-smi -rgc && pkill -RTMIN+8 waybar && notify-send "GPU Unlocked: Performance"

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4

bind = $mod, Return, exec, $terminal #terminal
bind = CTRL SHIFT, B, exec, $browser #zen
bind = $mod, E, exec, $filemanager   #thunar
bind = $mod, Space, exec, $launcher  #wofi

bind = SUPER ALT, left,  resizeactive, -40 0
bind = SUPER ALT, right, resizeactive,  40 0
bind = SUPER ALT, up,    resizeactive,  0 -40
bind = SUPER ALT, down,  resizeactive,  0  40


# Screenshot a window
bind = $mod, PRINT, exec, grim -g "$(slurp)" - | wl-copy

# Screenshot a monitor
bind = , PRINT, exec, grim - | wl-copy

# Screenshot a region and save to a file
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S').png

# ======================
# Media keys
# ======================

# ===== Volume (PipeWire, works for Bluetooth) =====
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


# Animations

animations {
    enabled = false
}

# 3-finger workspace switching
gesture = 3, horizontal, workspace, create
